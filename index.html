<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Reasons for Nadia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f051d 0%, #07020d 50%, #1a0b2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            color: #f7eedf;
        }

        /* Celestial Moon Background Elements */
        .moon-glow {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.08) 0%, rgba(255, 77, 109, 0.03) 70%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        header {
            text-align: center;
            z-index: 10;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #93c5fd, #ffb3c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(147, 197, 253, 0.3);
        }

        header p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #a78bfa;
            margin-top: 10px;
            font-weight: 400;
        }

        /* 3D Carousel Stage */
        .carousel-stage {
            width: 100%;
            height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            z-index: 10;
            position: relative;
        }

        .carousel-container {
            position: relative;
            width: 320px;
            height: 440px;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Glassmorphism Cosmic Cards */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6),
                        0 0 25px rgba(147, 197, 253, 0.05);
            backface-visibility: hidden;
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .card:hover {
            border-color: rgba(255, 117, 143, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6),
                        0 0 30px rgba(255, 117, 143, 0.2);
        }

        /* Inside Card Elements */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-number {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .zodiac-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: rgba(147, 197, 253, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            color: #93c5fd;
            border: 1px solid rgba(147, 197, 253, 0.2);
        }

        .message-body {
            font-size: 0.95rem;
            line-height: 1.7;
            font-weight: 400;
            color: #f1f5f9;
            margin: 20px 0 15px 0;
        }

        .quote-box {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ffb3c1;
            border-left: 2px solid rgba(255, 117, 143, 0.5);
            padding-left: 12px;
        }

        .card-footer {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        /* Intuitive Controls */
        .controls {
            display: flex;
            gap: 25px;
            margin-top: 30px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f7eedf;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(147, 197, 253, 0.2), rgba(255, 77, 109, 0.2));
            border-color: #ff758f;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="moon-glow"></div>

    <header>
        <h1>10 Chapters of You</h1>
        <p>To My Intuitive, Nurturing &amp; Beautiful Cancer Queen, Nadia</p>
    </header>

    <div class="carousel-stage">
        <div class="carousel-container" id="carousel">
            <!-- Cards will be dynamically injected by JavaScript for ultra-clean layout -->
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">←</button>
        <button class="btn" id="nextBtn">→</button>
    </div>

    <script>
        // The 10 specific romantic points curated perfectly for a intuitive, deep-loving Cancer woman
        const cardData = [
            {
                tag: "The Moonchild",
                msg: "Nadia, like the moon rules your sign, your emotional depth and intuition anchor my entire world. You feel things with such beautiful intensity, and being loved by you is a privilege I cherish daily.",
                quote: "\"You and I are like the earth and moon; your love pulls at my tide, moving everything inside me.\""
            },
            {
                tag: "Safe Harbor",
                msg: "Cancers are known for building the warmest homes, but my favorite place isn't a building—it's right next to you. Your presence instantly washes away any chaos in my life.",
                quote: "\"In all the world, there is no heart for me like yours. In all the world, there is no love for you like mine.\" — Maya Angelou"
            },
            {
                tag: "Fierce Protection",
                msg: "I love how fiercely protective you are of the people you hold close. Your loyalty is an unspoken shield, and knowing I am inside your inner circle makes me the luckiest man alive.",
                quote: "\"To be fully seen by somebody, then, and be loved anyhow—this is a human offering that can border on miraculous.\""
            },
            {
                tag: "Unconditional Heart",
                msg: "Your empathy knows no bounds, Nadia. You read my mind before I even speak, sensing every mood with effortless grace. Thank you for always listening with your soul first.",
                quote: "\"The best and most beautiful things in this world cannot be seen or even heard, but must be felt with the heart.\""
            },
            {
                tag: "Endless Depth",
                msg: "Just like the ocean depths of your water element, there is a mystery and complexity to you that fascinates me more every day. I never want to stop learning you.",
                quote: "\"I love you right up to the moon—and back.\" — Sam McBratney"
            },
            {
                tag: "Quiet Radiance",
                msg: "You don't need a loud spotlight to command a room. Your grace, elegance, and soft, comforting brilliance pull everyone toward you naturally. You glow from within.",
                quote: "\"Whatever our souls are made of, his and mine are the same.\" — Emily Brontë"
            },
            {
                tag: "The Ultimate Caretaker",
                msg: "The way you notice the little details, remember tiny things I mentioned weeks ago, and nurture my dreams is something I never take for granted. You make loving look like art.",
                quote: "\"To love and be loved is to feel the sun from both sides.\""
            },
            {
                tag: "Our Private Universe",
                msg: "Cancers protect their inner world, and I honor the beautiful, private universe we've built together. Every inside joke, shared glance, and secret dream is safe with me.",
                quote: "\"We loved with a love that was more than love.\" — Edgar Allan Poe"
            },
            {
                tag: "Emotional Anchor",
                msg: "When everything else feels unpredictable, your steady affection brings me back to reality. You are my beautiful constant in a rapidly shifting world.",
                quote: "\"I swear I couldn't love you more than I do right now, and yet I know I will tomorrow.\""
            },
            {
                tag: "Infinite Tomorrows",
                msg: "Happy Birthday, Nadia. May this year bring your beautiful, sentimental heart all the peace, laughter, and overwhelming joy you so effortlessly give to everyone around you.",
                quote: "\"Grow old along with me! The best is yet to be.\" — Robert Browning"
            }
        ];

        const carousel = document.getElementById('carousel');
        const cardCount = cardData.length;
        let currentIndex = 0;
        
        // Calculate the exact angle distribution for 10 items
        const anglePerCard = 360 / cardCount;
        // Radius of the 3D circle layout
        const radius = 520; 

        // Generate the 3D rotating cards
        cardData.forEach((data, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            
            // Initial positioning in 3D Space
            const angle = index * anglePerCard;
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-number">0${index + 1}</span>
                    <span class="zodiac-badge">${data.tag}</span>
                </div>
                <p class="message-body">${data.msg}</p>
                <div class="quote-box">${data.quote}</div>
                <div class="card-footer">Made for Nadia • Happy Birthday</div>
            `;
            carousel.appendChild(card);
        });

        // Rotation updates
        function updateCarousel() {
            const rotationAngle = -currentIndex * anglePerCard;
            carousel.style.transform = `rotateY(${rotationAngle}deg)`;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentIndex--;
            updateCarousel();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex++;
            updateCarousel();
        });

        // Initialize view
        updateCarousel();
    </script>
</body>
</html>
